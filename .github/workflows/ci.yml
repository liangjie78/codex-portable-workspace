name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: tools/cc-switch-worker-mcp/package-lock.json
      - name: Run portable and Worker checks
        shell: pwsh
        run: pwsh -NoProfile -File .\scripts\ci.ps1
