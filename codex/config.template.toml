model_reasoning_effort = "medium"
disable_response_storage = true
model_context_window = 1000000
model_auto_compact_token_limit = 900000
model = "gpt-5.5"
personality = "friendly"

[desktop]
localeOverride = "zh-CN"
conversationDetailMode = "STEPS_COMMANDS"
show-context-window-usage = true
composerEnterBehavior = "enter"
hotkey-window-projectless-default-enabled = false
appearanceTheme = "system"

[windows]
sandbox = "elevated"

[projects.'{{WORKSPACE_TOML}}']
trust_level = "trusted"

[plugins."documents@openai-primary-runtime"]
enabled = true

[plugins."spreadsheets@openai-primary-runtime"]
enabled = true

[plugins."presentations@openai-primary-runtime"]
enabled = true

[plugins."computer-use@openai-bundled"]
enabled = true

[plugins."pdf@openai-primary-runtime"]
enabled = true

[plugins."browser@openai-bundled"]
enabled = true

[mcp_servers.cc-switch-worker]
command = "{{NODE_EXE_TOML}}"
args = ["{{WORKER_ENTRY_TOML}}"]
startup_timeout_sec = 30

[mcp_servers.codex-memory]
type = "stdio"
command = "{{NODE_EXE_TOML}}"
args = ["{{CODEX_MEMORY_ENTRY_TOML}}"]
enabled = true
startup_timeout_sec = 30
tool_timeout_sec = 120

[mcp_servers.codex-memory.env]
CODEX_MEMORY_ROOT = "{{CODEX_MEMORY_ROOT_TOML}}"

[mcp_servers.codex-memory.tools.rag_search]
approval_mode = "auto"

[mcp_servers.codex-memory.tools.rag_get]
approval_mode = "auto"

[mcp_servers.codex-memory.tools.rag_upsert]
approval_mode = "auto"

[mcp_servers.codex-memory.tools.rag_finish_task]
approval_mode = "auto"

[mcp_servers.codex-memory.tools.rag_validate]
approval_mode = "auto"

[mcp_servers.codex-memory.tools.rag_reindex]
approval_mode = "auto"

[features]
js_repl = false
